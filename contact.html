<!DOCTYPE html>
<html>
<head>
    <title>AI Robotics Site</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="home-bg">

<div class="container">

<header>
    <h1 style="background-color: black; text-align: center;">AI & Robotics Portfolio</h1>
</header>

<main>

<!-- Top Bar -->
<div class="top-bar">
    
    <div class="logo">
        <h2>🤖 RoboShop</h2>
    </div>

    <nav class="top-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="search-box">
        <input type="text" placeholder="Search">
    </div>

</div>

<h3 class="contact-title">Contact Us</h3>

<div class="contact-container">

    <!-- FORM -->
    <div class="form-box">
        <form onsubmit="return validateForm()">
            <label>Full Name</label>
            <input type="text" id="name" placeholder="Full Name">

            <label>Email</label>
            <input type="email" id="email" placeholder="Your Email">

            <label>Subject</label>
            <input type="text" placeholder="Your Subject">

            <label>Message</label>
            <textarea placeholder="Your Message"></textarea>

            <button type="submit">Send</button>
            <button type="reset">Reset</button>
        </form>
    </div>

    <!-- INFO -->
    <div class="info-box">
        <img src="images/image2.jpg" width="170" alt="robot">

        <p><b>Postal Address</b><br>
        The Robo Shop<br>
        Kathmandu, Baneshwor</p>

        <p><b>Phone:</b> +977 35252352<br>
        <b>Email:</b> info@gaga.geag.com</p>

        <p><b>Assistance:</b> +977 985252722</p>
    </div>

    <!-- SIDE -->
    <div class="side-box">
        <h4>Related</h4>
        <img src="images/image5.jpg" width="170" alt="robot">
        <br><br>
        <button>Call Hotline</button>
        <br>
        <br>
        <button>Apply for Position</button>
    </div>

</div>

<!-- MAP -->
<div class="map">
    <img src="images/map.png" width="40%" alt="map">
</div>

</main>

<footer>
    <p style="background-color: black;">AI Robotics Site | Kathmandu, Nepal | your@email.com</p>
</footer>

</div>

<script src="script.js"></script>

</body>
</html>
